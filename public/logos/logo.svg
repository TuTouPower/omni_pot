<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#mainGrad)"/>

  <!-- Subtle inner glow -->
  <circle cx="230" cy="220" r="180" fill="url(#glowGrad)"/>

  <!-- Pot body - rounded vessel shape -->
  <path d="M156,200 C156,200 148,192 160,180 L352,180 C364,192 356,200 356,200 L340,340 C338,360 320,376 300,376 L212,376 C192,376 174,360 172,340 Z" fill="white" opacity="0.95"/>

  <!-- Pot rim -->
  <rect x="144" y="172" width="224" height="16" rx="8" fill="white" opacity="0.95"/>

  <!-- Pot handle left -->
  <path d="M156,220 C120,220 104,248 108,280 C112,312 132,328 156,324" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.95"/>

  <!-- Pot handle right -->
  <path d="M356,220 C392,220 408,248 404,280 C400,312 380,328 356,324" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.95"/>

  <!-- Translation symbol: "A" with arrow to "文" concept - stylized -->
  <!-- Letter A -->
  <text x="220" y="290" font-family="Arial, sans-serif" font-weight="800" font-size="72" fill="#6366f1" text-anchor="middle">A</text>

  <!-- Arrow -->
  <path d="M252,268 L282,268" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <path d="M276,260 L286,268 L276,276" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stylized character/文 hint -->
  <text x="308" y="290" font-family="Arial, sans-serif" font-weight="800" font-size="72" fill="#7c3aed" text-anchor="middle">文</text>

  <!-- Scan line (OCR reference) -->
  <line x1="180" y1="320" x2="332" y2="320" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="180" y1="332" x2="280" y2="332" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Small dots representing universal/all languages -->
  <circle cx="196" cy="148" r="6" fill="white" opacity="0.7"/>
  <circle cx="256" cy="136" r="8" fill="white" opacity="0.8"/>
  <circle cx="316" cy="148" r="6" fill="white" opacity="0.7"/>
  <circle cx="348" cy="164" r="4" fill="white" opacity="0.5"/>
  <circle cx="164" cy="164" r="4" fill="white" opacity="0.5"/>
</svg>
