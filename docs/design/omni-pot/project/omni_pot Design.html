<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Omni Pot · 设计</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body, #root { height: 100%; }
  body { background: #f0eee9; overflow: hidden; }
  .dc-editable, [class^="dc-"], [class*=" dc-"] { font-family: var(--font-sans, system-ui); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="importmap">
{
  "imports": {
    "react": "./react-shim.js"
  }
}
</script>
<script type="module">
  // Load react-icons via esm.sh, but tell it to leave `react` external so
  // it imports the global React (via the importmap shim above). This keeps
  // the React instance the same as the host app's, so element symbols match.
  try {
    const [md, cg] = await Promise.all([
      import('https://esm.sh/react-icons@5.3.0/md?external=react'),
      import('https://esm.sh/react-icons@5.3.0/cg?external=react'),
    ]);
    window.MdSmartButton = md.MdSmartButton;
    window.CgSpaceBetween = cg.CgSpaceBetween;
  } catch (e) {
    console.error('[react-icons] load failed', e);
  } finally {
    window.__reactIconsReady = true;
    window.dispatchEvent(new CustomEvent('react-icons-loaded'));
  }
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="windows/translate.jsx"></script>
<script type="text/babel" src="windows/other.jsx"></script>
<script type="text/babel" src="windows/config.jsx"></script>

<script type="text/babel" data-presets="env,react">

const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "primary": "#5a9bbf"
}/*EDITMODE-END*/;

// Radius is fixed at 10px across the app — no longer tweakable.
const FIXED_RADIUS = 10;

// 5 restrained options: clay-orange, azure-blue, sage-green, mustard-yellow, sky-blue
const COLOR_OPTIONS = [
'#c4623a', // clay orange
'#3a6ea5', // azure
'#5c8a4f', // sage green
'#b8902f', // mustard yellow
'#5a9bbf' // light sky blue
];

function shade(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + Math.round(2.55 * percent);
  let g = (num >> 8 & 0xff) + Math.round(2.55 * percent);
  let b = (num & 0xff) + Math.round(2.55 * percent);
  r = Math.max(0, Math.min(255, r));g = Math.max(0, Math.min(255, g));b = Math.max(0, Math.min(255, b));
  return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
}

function applyTweaks(t) {
  const root = document.documentElement;
  document.body.classList.toggle('dark', t.theme === 'dark' || t.theme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
  if (t.primary) {
    root.style.setProperty('--brand-primary', t.primary);
    root.style.setProperty('--brand-primary-soft', t.primary + '22');
    root.style.setProperty('--brand-primary-hover', shade(t.primary, -10));
  }
  // Fixed radius — no tweak.
  root.style.setProperty('--r-md', FIXED_RADIUS + 'px');
  root.style.setProperty('--r-lg', FIXED_RADIUS + 2 + 'px');
  root.style.setProperty('--r-sm', Math.max(2, FIXED_RADIUS - 2) + 'px');
  // density: lock to comfortable
  root.style.setProperty('--row-h', '36px');
  root.style.setProperty('--pad', '14px');
  root.style.setProperty('--gap', '12px');
  root.style.setProperty('--fs-base', '13px');
}

// Sample data
const SAMPLE_SERVICES = [
{ key: 'deepl@a', name: 'deepl' },
{ key: 'bing@b', name: 'bing' },
{ key: 'google@c', name: 'google' },
{ key: 'mymemory@d', name: 'mymemory' }];

const SAMPLE_RESULTS = {
  'deepl@a': { text: '该函数必须满足结合律与交换律——否则到达操作的顺序就会影响结果，从而不再是一个 CRDT。' },
  'bing@b': { text: '合并函数必须同时满足结合律和交换律；一旦不满足，操作到达的顺序就会改变最终结果，那么它就不再是 CRDT 了。' },
  'google@c': { text: '该函数必须是关联的和可交换的——否则到达操作的顺序很重要，结果不再是 CRDT。' },
  'mymemory@d': { loading: true }
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => {applyTweaks(t);}, [t]);

  return (
    <>
      <DesignCanvas backgroundColor="#f0eee9" title="Omni Pot · 桌面工具界面设计" subtitle="跨平台 · 自定义品牌 · 圆角分卡 · 克制配色">
        <DCSection id="overview" title="01 · 翻译窗口" subtitle="划词/输入触发的主入口。源文本框自适应高度，最多 8 行后内部滚动">
          <DCArtboard id="translate-short" label="短文本 · 自适应" width={400} height={540} style={{ height: 'auto' }}>
            <TranslateWindow
              services={SAMPLE_SERVICES.slice(0, 3)}
              results={SAMPLE_RESULTS}
              sourceText="eventual consistency" />
          </DCArtboard>
          <DCArtboard id="translate" label="长文本 · 多引擎" width={400} height={720} style={{ height: 'auto' }}>
            <TranslateWindow
              services={SAMPLE_SERVICES}
              results={SAMPLE_RESULTS}
              sourceText="The merge function must be both associative and commutative — otherwise the order of arriving operations matters and the result is no longer a CRDT. This invariant becomes critical once you start considering Byzantine actors or out-of-order delivery across geographically distributed replicas. In practice we relax to per-region consistency and reconcile every 60 seconds via a vector-clock merge, which gives us liveness without sacrificing correctness during the common case. Operators who care should monitor the divergence histogram in Grafana." />
          </DCArtboard>
          <DCArtboard id="dict" label="词典 · 英文字词" width={420} height={780} style={{ height: 'auto' }}>
            <DictWindow lang="en" />
          </DCArtboard>
          <DCArtboard id="dict-zh" label="词典 · 中文字词" width={420} height={780} style={{ height: 'auto' }}>
            <DictWindow lang="zh" />
          </DCArtboard>
        </DCSection>

        <DCSection id="ocr" title="02 · 文字识别 / 截图翻译" subtitle="标题栏 · 图像与文本并置 · 文字识别与截图翻译为两个独立窗口">
          <DCArtboard id="recognize" label="文字识别窗口" width={860} height={520}>
            <RecognizeWindow />
          </DCArtboard>
          <DCArtboard id="recognize-translate" label="截图翻译窗口" width={860} height={560}>
            <RecognizeWindow translate />
          </DCArtboard>
        </DCSection>

        <DCSection id="capture" title="03 · 截图覆盖层" subtitle="拖动选取屏幕区域，主色仅用于选区描边与尺寸标签">
          <DCArtboard id="screenshot" label="截图选区" width={720} height={420}>
            <ScreenshotOverlay />
          </DCArtboard>
        </DCSection>

        <DCSection id="config" title="04 · 设置窗口" subtitle="左侧导航 + 右侧内容。7 个子页面，覆盖所有用户偏好与服务管理">
          <DCArtboard id="cfg-general" label="通用" width={720} height={740}><ConfigWindow initial="general" />
          </DCArtboard>
          <DCArtboard id="cfg-translate" label="翻译" width={720} height={740}><ConfigWindow initial="translate" />
          </DCArtboard>
          <DCArtboard id="cfg-recognize" label="文字识别" width={720} height={740}><ConfigWindow initial="recognize" />
          </DCArtboard>
          <DCArtboard id="cfg-hotkey" label="快捷键" width={720} height={740}><ConfigWindow initial="hotkey" />
          </DCArtboard>
          <DCArtboard id="cfg-service" label="服务管理" width={720} height={740}><ConfigWindow initial="service" />
          </DCArtboard>
          <DCArtboard id="cfg-history" label="历史记录" width={720} height={740}><ConfigWindow initial="history" />
          </DCArtboard>
          <DCArtboard id="cfg-backup" label="备份" width={720} height={740}><ConfigWindow initial="backup" />
          </DCArtboard>
          <DCArtboard id="cfg-about" label="关于" width={720} height={740}><ConfigWindow initial="about" />
          </DCArtboard>
        </DCSection>

        <DCSection id="ambient" title="05 · 后台 · 托盘 · 更新" subtitle="不常出现但必须做好的边角料">
          <DCArtboard id="tray" label="系统托盘菜单" width={360} height={440}>
            <div style={{ padding: 16, background: '#f0eee9', height: '100%', borderRadius: 12, display: 'flex', justifyContent: 'center', paddingTop: 32 }}>
              <TrayMenu />
            </div>
          </DCArtboard>
          <DCArtboard id="updater" label="更新器" width={600} height={420}>
            <UpdaterWindow />
          </DCArtboard>
        </DCSection>

        <DCSection id="states" title="06 · 状态细节" subtitle="加载、错误、首次启动、桌面通知、提示横幅">
          <DCArtboard id="loading" label="翻译中" width={400} height={380} style={{ height: 'auto' }}>
            <TranslateLoadingState />
          </DCArtboard>
          <DCArtboard id="error" label="API 错误" width={400} height={380} style={{ height: 'auto' }}>
            <TranslateErrorState />
          </DCArtboard>
          <DCArtboard id="empty" label="首次启动" width={440} height={420} style={{ height: 'auto' }}>
            <TranslateEmptyState />
          </DCArtboard>
          <DCArtboard id="notif" label="桌面通知" width={360} height={140} style={{ height: 'auto', background: 'transparent', boxShadow: 'none' }}>
            <Notification />
          </DCArtboard>
          <DCArtboard id="hotkey-warn" label="快捷键占用提示" width={520} height={160} style={{ height: 'auto', background: 'transparent', boxShadow: 'none' }}>
            <HotkeyUnavailableBanner />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection title="主题">
          <TweakRadio label="外观" value={t.theme} onChange={(v) => setTweak('theme', v)}
          options={[{ value: 'light', label: '亮' }, { value: 'dark', label: '暗' }, { value: 'auto', label: '跟随' }]} />
          <TweakColor label="主色调" value={t.primary} options={COLOR_OPTIONS} onChange={(v) => setTweak('primary', v)} />
        </TweakSection>
      </TweaksPanel>
    </>);

}

// ===== State variants =====
function TranslateLoadingState() {
  return (
    <div className="op-window" style={{ width: '100%' }}>
      <TitlebarLeft mode="翻译" pinned={true} />
      <div style={{ padding: '4px 10px 12px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div className="card" style={{ padding: '10px 12px' }}>
          <div style={{ fontSize: 13.5, lineHeight: 1.55 }}>The merge function must be associative and commutative.</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8 }}>
            <span style={{ fontSize: 11.5, color: 'var(--text-mute)', fontFamily: 'var(--font-mono)' }}>
              检测为 <span style={{ color: 'var(--brand-primary)', fontWeight: 600 }}>英文</span>
            </span>
            <div style={{ flex: 1 }} />
            <button className="ic-btn brand"><Icons.Translate size={16} /></button>
          </div>
        </div>
        <div className="card" style={{ padding: '4px 12px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
          <span style={{ fontSize: 13.5, fontWeight: 500 }}>自动检测</span>
          <Icons.Swap size={18} style={{ color: 'var(--text)' }} />
          <span style={{ fontSize: 13.5, fontWeight: 500 }}>简体中文</span>
        </div>
        {[0, 1].map((i) =>
        <div key={i} className="card" style={{ padding: '10px 12px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <SvcTile name={['deepl', 'bing'][i]} />
              <div style={{ fontSize: 13, fontWeight: 600 }}>{['DeepL', 'Bing'][i]}</div>
              <span className="dots" aria-label="翻译中"><span /><span /><span /></span>
              <div style={{ flex: 1 }} />
              <button className="ic-btn" title="展开"><Icons.Chev size={15} style={{ transform: 'rotate(-90deg)' }} /></button>
            </div>
          </div>
        )}
      </div>
    </div>);

}

function TranslateErrorState() {
  return (
    <div className="op-window" style={{ width: '100%' }}>
      <TitlebarLeft mode="翻译" pinned={true} />
      <div style={{ padding: '4px 10px 12px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div className="card" style={{ padding: '10px 12px' }}>
          <div style={{ fontSize: 13.5 }}>The merge function must be associative and commutative.</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8 }}>
            <span style={{ fontSize: 11.5, color: 'var(--text-mute)', fontFamily: 'var(--font-mono)' }}>
              检测为 <span style={{ color: 'var(--brand-primary)', fontWeight: 600 }}>英文</span>
            </span>
            <div style={{ flex: 1 }} />
            <button className="ic-btn brand"><Icons.Translate size={16} /></button>
          </div>
        </div>
        <div className="card" style={{ padding: '10px 12px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <SvcTile name="bing" />
            <div style={{ fontSize: 12.5, fontWeight: 600 }}>Bing</div>
            <span className="chip plain mono" style={{ color: 'var(--danger)', borderColor: 'color-mix(in oklab, var(--danger) 25%, transparent)', fontSize: 10 }}>401</span>
            <div style={{ flex: 1 }} />
            <button className="ic-btn" title="重试"><Icons.Cycle size={14} /></button>
          </div>
          <div style={{ marginTop: 8, color: 'var(--danger)', fontSize: 12.5 }}>Invalid API key — 请到「服务 → Bing」检查 apiKey 字段</div>
          <button className="btn xs" style={{ marginTop: 8 }}>打开设置</button>
        </div>
        <div className="card" style={{ padding: '10px 12px', opacity: 0.7 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <SvcTile name="deepl" />
            <div style={{ fontSize: 12.5, fontWeight: 600 }}>DeepL</div>
            <span className="chip plain mono" style={{ fontSize: 10 }}>网络超时</span>
            <div style={{ flex: 1 }} />
            <button className="ic-btn"><Icons.Cycle size={14} /></button>
          </div>
        </div>
      </div>
    </div>);

}

// First-launch — 翻译 (含划词+输入) / 文字识别 / 截图翻译 三个入口
function TranslateEmptyState() {
  const Item = ({ icon, title, sub, kbd }) =>
  <div className="card" style={{ padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{
      width: 30, height: 30, borderRadius: 8,
      background: 'var(--brand-primary-soft)', color: 'var(--brand-primary)',
      display: 'grid', placeItems: 'center', flex: '0 0 30px'
    }}>
        {icon}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600 }}>{title}</div>
        <div className="hint" style={{ marginTop: 1 }}>{sub}</div>
      </div>
      <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        {kbd.map((k, i) => (
          <React.Fragment key={i}>
            <kbd style={{ fontSize: 10.5 }}>{k}</kbd>
            {i < kbd.length - 1 && <span className="hint" style={{ fontSize: 10.5 }}>+</span>}
          </React.Fragment>
        ))}
      </div>
    </div>;

  return (
    <div className="op-window" style={{ width: '100%' }}>
      <TitlebarLeft mode="翻译" pinned={false} />
      <div style={{ padding: '4px 12px 14px', display: 'flex', flexDirection: 'column', gap: 10 }} data-comment-anchor="f02e1ae7f3-div-268-7">
        <div style={{ padding: '6px 4px 0', display: 'flex', alignItems: 'center', gap: 10 }}>
          <div className="svc-tile" style={{ width: 32, height: 32, borderRadius: 10, background: 'var(--brand-primary)', color: '#fff', borderColor: 'transparent', fontSize: 12 }}>op</div>
          <div className="stack">
            <div style={{ fontSize: 14, fontWeight: 600 }}>欢迎使用 Omni Pot</div>
            <div className="hint">下面的快捷键已为你预设，随时可在「设置」中修改</div>
          </div>
        </div>
        <Item icon={<Icons.Translate size={16} />} title="翻译" sub="选中文本时翻译该文本；未选中时弹出空翻译窗口" kbd={['Ctrl', 'Alt', 'T']} />
        <Item icon={<Icons.Type size={16} />} title="词典" sub="选中字词查询词典释义" kbd={['Ctrl', 'Alt', 'D']} />
        <Item icon={<Icons.Camera size={16} />} title="文字识别" sub="截图后将文字提取到识别窗口" kbd={['Ctrl', 'Alt', 'S']} />
        <Item icon={<Icons.Image size={16} />} title="截图翻译" sub="截图、识别并直接翻译结果" kbd={['Ctrl', 'Alt', 'Shift', 'S']} />
        <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end', marginTop: 4 }}>
          <button className="btn sm"><Icons.Settings size={13} />设置快捷键</button>
          <button className="btn sm" style={{ color: 'var(--brand-primary)' }}>跳过</button>
        </div>
      </div>
    </div>);

}

function HotkeyUnavailableBanner() {
  return (
    <div style={{ padding: 0, display: 'flex', alignItems: 'center' }}>
      <div className="card" style={{ background: 'color-mix(in oklab, var(--danger) 14%, transparent)', borderColor: 'transparent', width: '100%' }}>
        <div style={{ padding: 14, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
          <Icons.Info size={16} style={{ color: 'var(--danger)', marginTop: 1, flex: '0 0 16px' }} />
          <div style={{ fontSize: 12.5, color: 'var(--danger)', lineHeight: 1.55 }}>
            <div style={{ fontWeight: 600, marginBottom: 4 }}>快捷键已被其他应用占用</div>
            <div style={{ color: 'var(--text-dim)' }}>
              <span className="mono" style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--text)' }}>Ctrl + Alt + T</span> 未能注册。请释放该快捷键后重试，或选择另一组。
            </div>
          </div>
        </div>
      </div>
    </div>);

}

function Notification() {
  return (
    <div style={{ padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--line)', borderRadius: 12, padding: '12px 14px', display: 'flex', gap: 12, alignItems: 'flex-start', boxShadow: '0 8px 24px rgba(0,0,0,0.08)', width: 320 }}>
        <div className="svc-tile" style={{ background: 'var(--brand-primary)', color: '#fff', borderColor: 'transparent', width: 32, height: 32, fontSize: 12 }}>op</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12.5, fontWeight: 600 }}>已翻译并复制</div>
          <div className="hint" style={{ marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>该函数必须满足结合律与交换律——</div>
        </div>
        <button className="ic-btn"><Icons.Close size={13} /></button>
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
