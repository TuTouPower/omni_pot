<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Omni Pot · 设计</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body, #root { height: 100%; }
  body { background: #f0eee9; overflow: hidden; }
  .dc-editable, [class^="dc-"], [class*=" dc-"] { font-family: var(--font-sans, system-ui); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="windows/translate.jsx"></script>
<script type="text/babel" src="windows/other.jsx"></script>
<script type="text/babel" src="windows/config.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "primary": "#5a9bbf",
  "radius": 10
}/*EDITMODE-END*/;

// 5 restrained options: clay-orange, azure-blue, sage-green, mustard-yellow, sky-blue
const COLOR_OPTIONS = [
  '#c4623a',  // clay orange
  '#3a6ea5',  // azure
  '#5c8a4f',  // sage green
  '#b8902f',  // mustard yellow
  '#5a9bbf',  // light sky blue
];

function shade(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + Math.round(2.55 * percent);
  let g = ((num >> 8) & 0xff) + Math.round(2.55 * percent);
  let b = (num & 0xff) + Math.round(2.55 * percent);
  r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function applyTweaks(t) {
  const root = document.documentElement;
  document.body.classList.toggle('dark', t.theme === 'dark' || (t.theme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches));
  if (t.primary) {
    root.style.setProperty('--brand-primary', t.primary);
    root.style.setProperty('--brand-primary-soft', t.primary + '22');
    root.style.setProperty('--brand-primary-hover', shade(t.primary, -10));
  }
  if (typeof t.radius === 'number') {
    root.style.setProperty('--r-md', t.radius + 'px');
    root.style.setProperty('--r-lg', (t.radius + 2) + 'px');
    root.style.setProperty('--r-sm', Math.max(2, t.radius - 2) + 'px');
  }
  // density: lock to comfortable
  root.style.setProperty('--row-h', '36px');
  root.style.setProperty('--pad', '14px');
  root.style.setProperty('--gap', '12px');
  root.style.setProperty('--fs-base', '13px');
}

// Sample data
const SAMPLE_SERVICES = [
  { key: 'deepl@a', name: 'deepl' },
  { key: 'openai@b', name: 'openai', streaming: true },
  { key: 'google@c', name: 'google' },
  { key: 'mymemory@d', name: 'mymemory' },
];
const SAMPLE_RESULTS = {
  'deepl@a': { text: '该函数必须满足结合律与交换律——否则到达操作的顺序就会影响结果，从而不再是一个 CRDT。' },
  'openai@b': { text: '合并函数必须同时满足结合律和交换律；一旦不满足，操作到达的顺序就会改变最终结果，那么它就不再是 CRDT 了。', streaming: true },
  'google@c': { text: '该函数必须是关联的和可交换的——否则到达操作的顺序很重要，结果不再是 CRDT。' },
  'mymemory@d': { loading: true },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => { applyTweaks(t); }, [t]);

  return (
    <>
      <DesignCanvas backgroundColor="#f0eee9" title="Omni Pot · 桌面工具界面设计" subtitle="跨平台 · 自定义品牌 · 圆角分卡 · 克制配色">
        <DCSection id="overview" title="01 · 翻译窗口" subtitle="划词/输入触发的主入口。源文本框自适应高度，最多 8 行后内部滚动">
          <DCArtboard id="translate-short" label="短文本 · 自适应" width={400} height={560}>
            <TranslateWindow
              services={SAMPLE_SERVICES.slice(0,3)}
              results={SAMPLE_RESULTS}
              sourceText="eventual consistency" />
          </DCArtboard>
          <DCArtboard id="translate" label="长文本 · 多引擎" width={400} height={680}>
            <TranslateWindow
              services={SAMPLE_SERVICES}
              results={SAMPLE_RESULTS}
              sourceText="The merge function must be both associative and commutative — otherwise the order of arriving operations matters and the result is no longer a CRDT. This invariant becomes critical once you start considering Byzantine actors or out-of-order delivery across geographically distributed replicas." />
          </DCArtboard>
          <DCArtboard id="dict" label="词典 · 单词查询" width={420} height={680}>
            <DictWindow />
          </DCArtboard>
        </DCSection>

        <DCSection id="ocr" title="02 · 识别 / OCR" subtitle="标题栏 · 图像与文本并置 · 底部动作条（引擎 / 语言 / 重新识别 · 去换行 / 去空格 / 复制 / 导出 / 翻译）">
          <DCArtboard id="recognize" label="识别窗口" width={860} height={520}>
            <RecognizeWindow />
          </DCArtboard>
        </DCSection>

        <DCSection id="capture" title="03 · 截图覆盖层" subtitle="拖动选取屏幕区域，主色仅用于选区描边与尺寸标签">
          <DCArtboard id="screenshot" label="截图选区" width={720} height={420}>
            <ScreenshotOverlay />
          </DCArtboard>
        </DCSection>

        <DCSection id="config" title="04 · 配置窗口" subtitle="左侧导航 + 右侧内容。7 个子页面，覆盖所有用户偏好与服务管理">
          <DCArtboard id="cfg-general" label="通用" width={780} height={560}>
            <ConfigWindow initial="general" />
          </DCArtboard>
          <DCArtboard id="cfg-translate" label="翻译" width={780} height={560}>
            <ConfigWindow initial="translate" />
          </DCArtboard>
          <DCArtboard id="cfg-hotkey" label="快捷键" width={780} height={560}>
            <ConfigWindow initial="hotkey" />
          </DCArtboard>
          <DCArtboard id="cfg-service" label="服务管理" width={780} height={560}>
            <ConfigWindow initial="service" />
          </DCArtboard>
          <DCArtboard id="cfg-history" label="历史记录" width={780} height={560}>
            <ConfigWindow initial="history" />
          </DCArtboard>
          <DCArtboard id="cfg-backup" label="备份" width={780} height={560}>
            <ConfigWindow initial="backup" />
          </DCArtboard>
          <DCArtboard id="cfg-about" label="关于" width={780} height={560}>
            <ConfigWindow initial="about" />
          </DCArtboard>
        </DCSection>

        <DCSection id="ambient" title="05 · 后台 · 托盘 · 更新" subtitle="不常出现但必须做好的边角料">
          <DCArtboard id="tray" label="系统托盘菜单" width={300} height={440}>
            <div style={{ padding: 16, background: '#f0eee9', height: '100%', borderRadius: 12, display:'flex', justifyContent:'center', paddingTop: 32 }}>
              <TrayMenu />
            </div>
          </DCArtboard>
          <DCArtboard id="updater" label="更新器" width={600} height={420}>
            <UpdaterWindow />
          </DCArtboard>
        </DCSection>

        <DCSection id="states" title="06 · 状态细节" subtitle="加载、错误、首次启动、桌面通知">
          <DCArtboard id="loading" label="翻译中" width={400} height={380}>
            <TranslateLoadingState />
          </DCArtboard>
          <DCArtboard id="error" label="API 错误" width={400} height={380}>
            <TranslateErrorState />
          </DCArtboard>
          <DCArtboard id="empty" label="首次启动" width={440} height={420}>
            <TranslateEmptyState />
          </DCArtboard>
          <DCArtboard id="notif" label="桌面通知" width={360} height={140}>
            <Notification />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection title="主题">
          <TweakRadio label="外观" value={t.theme} onChange={v => setTweak('theme', v)}
            options={[{value:'light',label:'亮'},{value:'dark',label:'暗'},{value:'auto',label:'跟随'}]} />
          <TweakColor label="主色调" value={t.primary} options={COLOR_OPTIONS} onChange={v => setTweak('primary', v)} />
        </TweakSection>
        <TweakSection title="布局">
          <TweakSlider label="圆角" value={t.radius} min={4} max={16} step={1} onChange={v => setTweak('radius', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// ===== State variants =====
function TranslateLoadingState() {
  return (
    <div className="op-window" style={{ width: '100%', height: '100%' }}>
      <TitlebarLeft mode="翻译" pinned={true} />
      <div style={{ padding: '4px 10px 12px', display:'flex', flexDirection:'column', gap: 8, flex:1, overflow:'hidden' }}>
        <div className="card" style={{ padding: '10px 12px' }}>
          <div style={{ fontSize: 13.5, lineHeight: 1.55 }}>The merge function must be associative and commutative.</div>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop: 8 }}>
            <span style={{ fontSize: 11.5, color:'var(--text-mute)', fontFamily:'var(--font-mono)' }}>
              检测为 <span style={{ color:'var(--brand-primary)', fontWeight:600 }}>英文</span>
            </span>
            <div style={{flex:1}}/>
            <button className="ic-btn brand"><Icons.Translate size={16}/></button>
          </div>
        </div>
        <div className="card" style={{ padding: '4px 12px', display:'flex', alignItems:'center', justifyContent:'center', gap: 10 }}>
          <span style={{ fontSize: 13.5, fontWeight: 500 }}>自动检测</span>
          <Icons.Swap size={18} style={{ color:'var(--text)' }}/>
          <span style={{ fontSize: 13.5, fontWeight: 500 }}>简体中文</span>
        </div>
        {[0,1].map(i => (
          <div key={i} className="card" style={{ padding: '10px 12px' }}>
            <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
              <SvcTile name={['deepl','openai'][i]} />
              <div style={{ height: 8, width: 56, background:'var(--bg-card)', borderRadius: 4 }}/>
              <div style={{flex:1}}/>
              <span className="hint mono">翻译中…</span>
            </div>
            <div style={{ marginTop: 8, height: 8, width: '92%', background:'var(--bg-card)', borderRadius: 4 }}/>
            <div style={{ marginTop: 4, height: 8, width: '68%', background:'var(--bg-card)', borderRadius: 4 }}/>
          </div>
        ))}
      </div>
    </div>
  );
}

function TranslateErrorState() {
  return (
    <div className="op-window" style={{ width: '100%', height: '100%' }}>
      <TitlebarLeft mode="翻译" pinned={true} />
      <div style={{ padding: '4px 10px 12px', display:'flex', flexDirection:'column', gap: 8, flex:1, overflow:'hidden' }}>
        <div className="card" style={{ padding: '10px 12px' }}>
          <div style={{ fontSize: 13.5 }}>The merge function must be associative and commutative.</div>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop: 8 }}>
            <span style={{ fontSize: 11.5, color:'var(--text-mute)', fontFamily:'var(--font-mono)' }}>
              检测为 <span style={{ color:'var(--brand-primary)', fontWeight:600 }}>英文</span>
            </span>
            <div style={{flex:1}}/>
            <button className="ic-btn brand"><Icons.Translate size={16}/></button>
          </div>
        </div>
        <div className="card" style={{ padding: '10px 12px' }}>
          <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
            <SvcTile name="openai" />
            <div style={{ fontSize: 12.5, fontWeight: 600 }}>OpenAI</div>
            <span className="chip plain mono" style={{ color:'var(--danger)', borderColor:'color-mix(in oklab, var(--danger) 25%, transparent)', fontSize: 10 }}>401</span>
            <div style={{flex:1}}/>
            <button className="ic-btn" title="重试"><Icons.Cycle size={14}/></button>
          </div>
          <div style={{ marginTop: 8, color:'var(--danger)', fontSize: 12.5 }}>Invalid API key — 请到「服务 → OpenAI」检查 apiKey 字段</div>
          <button className="btn xs" style={{ marginTop: 8 }}>打开设置</button>
        </div>
        <div className="card" style={{ padding: '10px 12px', opacity: 0.7 }}>
          <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
            <SvcTile name="deepl" />
            <div style={{ fontSize: 12.5, fontWeight: 600 }}>DeepL</div>
            <span className="chip plain mono" style={{ fontSize: 10 }}>网络超时</span>
            <div style={{flex:1}}/>
            <button className="ic-btn"><Icons.Cycle size={14}/></button>
          </div>
        </div>
      </div>
    </div>
  );
}

// First-launch — show all 4 entry points (划词翻译/输入翻译/OCR 识别/OCR 翻译) as actionable rows
function TranslateEmptyState() {
  const Item = ({ icon, title, sub, kbd }) => (
    <div className="card" style={{ padding: '10px 12px', display:'flex', alignItems:'center', gap: 10 }}>
      <div style={{
        width: 30, height: 30, borderRadius: 8,
        background: 'var(--brand-primary-soft)', color: 'var(--brand-primary)',
        display:'grid', placeItems:'center', flex:'0 0 30px'
      }}>
        {icon}
      </div>
      <div style={{ flex:1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600 }}>{title}</div>
        <div className="hint" style={{ marginTop: 1 }}>{sub}</div>
      </div>
      <div style={{ display:'flex', gap: 2 }}>
        {kbd.map((k, i) => <kbd key={i} style={{ fontSize: 10.5 }}>{k}</kbd>)}
      </div>
    </div>
  );
  return (
    <div className="op-window" style={{ width: '100%', height: '100%' }}>
      <TitlebarLeft mode="翻译" pinned={false} />
      <div style={{ flex:1, padding: '4px 12px 14px', display:'flex', flexDirection:'column', gap: 10, overflow:'hidden' }}>
        <div style={{ padding: '6px 4px 0', display:'flex', alignItems:'center', gap: 10 }}>
          <div className="svc-tile" style={{ width: 32, height: 32, borderRadius: 10, background:'var(--brand-primary)', color:'#fff', borderColor:'transparent', fontSize: 12 }}>op</div>
          <div className="stack">
            <div style={{ fontSize: 14, fontWeight: 600 }}>欢迎使用 Omni Pot</div>
            <div className="hint">下面的快捷键已为你预设，随时可在「设置」中修改</div>
          </div>
        </div>
        <Item icon={<Icons.Translate size={16}/>} title="划词翻译" sub="选中文本后按下快捷键即翻译" kbd={['⌃','⌥','T']} />
        <Item icon={<Icons.Type size={16}/>} title="输入翻译" sub="呼出窗口手动输入要翻译的文本" kbd={['⌃','⌥','I']} />
        <Item icon={<Icons.Camera size={16}/>} title="OCR 识别" sub="截图后将文字提取到识别窗口" kbd={['⌃','⌥','S']} />
        <Item icon={<Icons.Image size={16}/>} title="OCR 翻译" sub="截图、识别并直接翻译结果" kbd={['⌃','⌥','⇧','S']} />
        <div style={{ display:'flex', gap: 6, justifyContent:'flex-end', marginTop: 4 }}>
          <button className="btn sm"><Icons.Settings size={13}/>配置快捷键</button>
          <button className="btn sm" style={{ color:'var(--brand-primary)' }}>跳过</button>
        </div>
      </div>
    </div>
  );
}

function Notification() {
  return (
    <div style={{ height: '100%', padding: 12, background:'#f0eee9', display:'flex', alignItems:'center', justifyContent:'center', borderRadius: 12 }}>
      <div style={{ background:'var(--bg-elev)', border:'1px solid var(--line)', borderRadius: 12, padding: '12px 14px', display:'flex', gap: 12, alignItems:'flex-start', boxShadow:'0 8px 24px rgba(0,0,0,0.08)', width: 320 }}>
        <div className="svc-tile" style={{ background:'var(--brand-primary)', color:'#fff', borderColor:'transparent', width: 32, height: 32, fontSize: 12 }}>op</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize: 12.5, fontWeight: 600 }}>已翻译并复制</div>
          <div className="hint" style={{ marginTop: 2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>该函数必须满足结合律与交换律——</div>
        </div>
        <button className="ic-btn"><Icons.Close size={13}/></button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
